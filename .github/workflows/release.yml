name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.version }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }
          if ($tag -notmatch '^v') { $tag = "v$tag" }
          $semver = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "semver=$semver" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows x64
        run: |
          dotnet publish ProgramBox.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.semver }} `
            -p:InformationalVersion=${{ steps.version.outputs.semver }} `
            -o ./publish/win-x64

      - name: Create zip
        shell: pwsh
        run: |
          $zip = "ProgramBox-${{ steps.version.outputs.semver }}-win-x64.zip"
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath "./$zip" -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT
        id: zip

      - name: Extract release notes
        id: notes
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $semver = '${{ steps.version.outputs.semver }}'
          $body = @"
          ## ProgramBox $tag

          ### 下载
          - **ProgramBox-$semver-win-x64.zip** — Windows 64 位，解压后运行 `ProgramBox.exe`

          ### 安装
          1. 在 [Releases](https://github.com/${{ github.repository }}/releases) 下载 zip
          2. 解压到任意目录
          3. 运行 `ProgramBox.exe`

          详细说明见 [在线文档](https://pengcunfu.github.io/devbox/)。
          "@
          if (Test-Path CHANGELOG.md) {
            $changelog = Get-Content CHANGELOG.md -Raw
            if ($changelog -match "(?s)## \[$semver\][^\#]*") {
              $section = $Matches[0].Trim()
              $body += "`n`n### 更新内容`n$section"
            }
          }
          $body | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ProgramBox ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: ${{ steps.zip.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
